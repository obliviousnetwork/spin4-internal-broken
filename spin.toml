#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "spin4-internal-broken"
version = "0.1.0"
authors = ["André Arko <andre@arko.net>"]
description = ""
targets = ["akamai-functions"]
# if this is set, every build fails with:
# Error: unable to check if the application is compatible with deployment targets
# Caused by:
#    0: Failed to get akamai:functions@1.0.0 from registry
#    1: registry error: Authentication failure: {"errors":[{"code":"DENIED","message":"requested access to the resource is denied"}]}
#    2: Authentication failure: {"errors":[{"code":"DENIED","message":"requested access to the resource is denied"}]}

[[trigger.http]]
route = "/..."
component = "spin4-internal-broken"

[component.spin4-internal-broken]
source = "target/wasm32-wasip2/release/spin4_internal_broken.wasm"
allowed_outbound_hosts = ["http://*:*"]
[component.spin4-internal-broken.build]
command = "cargo build --target wasm32-wasip2 --release"
watch = ["src/**/*.rs", "Cargo.toml"]

[[trigger.http]]
route = { private = true }
component = "one"

[component.one]
source = "one/target/wasm32-wasip2/release/one.wasm"
allowed_outbound_hosts = []
[component.one.build]
command = "cargo build --target wasm32-wasip2 --release"
workdir = "one"
watch = ["src/**/*.rs", "Cargo.toml"]

[[trigger.http]]
route = { private = true }
component = "two"

[component.two]
source = "two/target/wasm32-wasip2/release/two.wasm"
allowed_outbound_hosts = []
[component.two.build]
command = "cargo build --target wasm32-wasip2 --release"
workdir = "two"
watch = ["src/**/*.rs", "Cargo.toml"]
